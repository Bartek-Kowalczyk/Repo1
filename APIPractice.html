<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Frontend task</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <div id="container">
        <h1>Użytkownicy</h1>
        <ul id="list"></ul>

        <select id="searchMode">
            <option value="both">Name & Email</option>
            <option value="name">Name</option>
            <option value="email">Email</option>
        </select>
        <input type="text" placeholder="Search names/emails" id="searchtxt" oninput="searchUsers()">
        <input type="button" onclick="resetSearch()" value="Reset">
        <input type="button" onclick="toggleSort()" value="Sort direction">
        <p id="searchp">Here you will see all the results that match your search.<br>
        Tip: You can click "Escape" to reset your search.</p>
        <p id="resultsp">Here you will see the number of results.</p>
    </div>
</body>
</html>
