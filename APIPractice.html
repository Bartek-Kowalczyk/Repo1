<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Frontend task</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <script src="script.js"></script>
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="text-center mb-4">Użytkownicy</h1>

                    <div class="input-group mb-2">
                        <span class="input-group-text">🔍</span>
                        <input type="text" placeholder="Wyszukuj imiona/nazwiska" id="searchtxt" oninput="searchUsers()" class="form-control">
                        
                    </div>
                    <button class="btn btn-primary" onclick="toggleSort()">Kierunek sortowania</button>
                    <p id="sortP" class="d-inline-block alert alert-info py-2 mb-2">Kierunek sortowania: A-Z</p>
                    <p class="d-inline-block alert alert-warning py-2 mb-2">Możesz kliknąć przycisk Escape aby zresetować wyszukiwanie.</p>
                    <span id="resultsp" class="badge bg-primary">Tutaj zobaczysz ilość rezultatów.</span>
                    <ul class="list-group list-group-flush mt-3" id="list"></ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
